<!DOCTYPE html>
<html>
  
<style>
  :root {
    --gcg-dark-green: #314c3f;
    --gcg-yellow: #f3e96d;
    --gcg-yellow-text: #f1e56a; 
    --gcg-title-light: #f7f1a5;
    --gcg-peach: #f2a98c;
    --gcg-white: #ffffff;
  }

  body, 
  html {
    margin: 0;
    height: 100%;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background-color: var(--gcg-dark-green);
    color: var(--gcg-white);
  }

  /* Top bar like the screenshot */
  .top-bar {
    background-color: var(--gcg-dark-green);
    color: var(--gcg-yellow-text);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-bar .logo {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gcg-yellow);
  }

  .top-bar nav a {
    color: var(--gcg-yellow-text);
    text-decoration: none;
    margin-left: 24px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 13px;
  }

  .top-bar nav a:hover {
    color: var(--gcg-peach);
  }

  #container {
    display: flex;
    height: calc(100vh - 64px); /* 64px = approx top bar height */
  }

  #side-panel {
    width: 500px;
    max-width: 35%;
    background: rgba(16, 32, 26, 0.97); /* deep overlay */
    color: var(--gcg-title-light);
    padding: 20px;
    box-sizing: border-box;
    border-right: 2px solid rgba(255, 255, 255, 0.08);
  }

  #side-panel a {
  color: #ffffff;
  text-decoration: underline;   /* optional */
}

#side-panel a:hover {
  color: #f2a98c;               /* or keep white if you prefer */
}

  .site-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--gcg-title-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .site-description {
    margin-bottom: 16px;
    margin: 0 0 0.75rem; /* smaller, controlled spacing */
    color: var(--gcg-white);
    white-space: pre-line; /* turns \n into visible line breaks */
  }

  .image-row {
  display: flex;
  align-items: flex-start; /* align image with first line of text */
  gap: 0.5rem;            /* space between icon and text */
  margin-bottom: 0.75rem;
}

.image-row p {
  margin: 0;              /* no extra margin inside row */
}

  .site-image {
  max-width: 100%;
  border-radius: 8px;
  margin-bottom: 0.75rem;
  display: block;
  }

  .site-status {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 10px;
    border-radius: 999px;
    background-color: var(--gcg-peach);
    color: #2b2b2b;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: "Nunito Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.55;
  }

  /* Accent bar similar to the “BLOG” underline */
  .accent-bar {
    width: 120px;
    height: 4px;
    background-color: var(--gcg-peach);
    border-radius: 10px;
    margin: 10px 0 20px 0;
  }

  #map {
    flex: 1;
  }

  .filters {
    margin: 0.75rem 0 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  
  .filter-btn {
    background: transparent;
    border-radius: 999px;
    border: 1px solid #f2a98c;
    color: #f2a98c;
    font-size: 0.7rem;
    padding: 0.25rem 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
  }
  
  .filter-btn.active {
    background: #f2a98c;
    color: #2c4645;
  }
</style>

<body>
  
  <header class="top-bar">
    <div class="logo">GREEN CITY GROWERS</div>
    <nav>
      <a href="https://greencitygrowers.com/about-green-city-growers/">Company</a>
      <a href="https://greencitygrowers.com/urban-farming-products-and-services/">Products &amp; Services</a>
      <a href="https://greencitygrowers.com/urban-farming-products-and-services/commercial-real-estate/">Who We Serve</a>
      <a href="https://greencitygrowers.com/blog/">Learn</a>
      <a href="https://greencitygrowers.com/about-green-city-growers/careers/">Careers</a>
      <a href="https://greencitygrowers.com/contact-us/">Contact</a>
    </nav>
  </header>

  <div id="container">
    <div id="side-panel">
      <!-- Will be filled by showOverviewText() on load -->
    </div>

    <div id="map"></div>
  </div>
  
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAHmB2XzQZl6SUUPrPq2KzifXnryeddfk0&callback=initMap&loading=async"
    async
    defer
  ></script>

  <script>
    let map;
    let markers = [];

    // Example data for specific sites (normally from a database / API)
    const sites = [
      {
        id: 1,
        name: "Fenway Farms",
        type: "Commercial",
        position: { lat: 42.34686667880631, lng: -71.09675646330778 },
        description: `
          <div class="image-row">
            <img
              src="fenwayfarms.jpg"
              alt="Fenway Farms"
              class="trophy-icon"
              style="width: 480px; flex-shrink: 0;"
            />
          </div>
      
          <p>
          As Fenway Farms’ farmers since 2015, we’ve grown roughly 6,000 pounds of fresh produce at Fenway Park each year, reducing the need for distant food sources. Beyond farming, we’re also combatting urban heat and stormwater runoff, proving that sustainability is right in our backyard.
          
         <i>Read more:</i>
            <a
              href="https://www.newsweek.com/future-urban-farming-sits-along-fenways-green-monster-1837844/"
              target="_blank"
            >
              Fenway Farms
            </a>
          </p>
        `,
        status: "Live",
      },
      {
        id: 2,
        name: "Osborn Triangle",
        type: "Commercial",
        position: { lat: 42.36178047475023, lng: -71.09382715960147 },
        description: `
          <p>
           Home to some of the leading pharmaceutical companies, Osborn Triangle is a premier office and lab complex located in Kendall Square’s life science hub in Cambridge, MA.
           Size of garden: XX sq. ft.
           Amount of food produced to date: XX lbs
          </p>

      <div class="image-row">
        <img
          src="Osborn.png"
          alt="LEED Gold trophy"
          class="trophy-icon"
           style="width: 450px; flex-shrink: 0;"
        />

         </div>
        <p>
          Our garden’s high-quality local food production contributed to The Kensington’s LEED Gold certification, cementing their status as a place where building a greener future and a greener city are prioritized. 

         <a href=" https://greencitygrowers.com/success-stories/osborn-triangle/" target="_blank">
             Read more
            </a>
        </p>
        `,
        status: "Live",
      },
      {
        id: 3,
        name: "The Kensington",
        type: "Residential",
        position: { lat: 42.35198999214532, lng: -71.06327887045808 },
        description: `
          <p>
            The Kensington, located in Chinatown in downtown Boston, installed a Grobrix indoor vegetable-growing wall just outside their apartment gym. 
          </p>

      <div class="image-row">
        <img
          src="trophy.png"
          alt="LEED Gold trophy"
          class="trophy-icon"
           style="width: 32px; height: 32px; flex-shrink: 0;"
        />
        <p>
          Our garden’s high-quality local food production contributed to The Kensington’s LEED Gold certification, cementing their status as a place where building a greener future and a greener city are prioritized. 
        </p>
        
      </div>
          
          <p>
            <strong>Read more:</strong>
            <a href="https://greencitygrowers.com/success-stories/the-kensington-and-the-cove/" target="_blank">
              The Kensington &amp; The Cove
            </a>
          </p>
        `,
        status: "Live",
      },
      {
        id: 4,
        type: "HQ",
        name: "Headquarters",
        position: { lat: 42.37627441687818, lng: -71.09259116048692},
        description: "The home of Green City Growers. Located in Somerville, MA.",
        status: "Live",
      },
      {
        id: 5,
        name: "Madison Park Technical Vocational High School",
        type: "School",
        position: { lat: 42.33197552203007, lng: -71.09045194003089},
        description: "Students in the Madison Park Technical Vocational High School Special Education program debuted a Fork Farm hydroponic garden this past summer.",
        status: "Live",
      },
        {
        id: 6,
        name: "The Cove",
        type: "Residential",
        position: { lat: 42.244758875793266, lng: -70.9248655828096},
       description: `
          <p>
            The Cove, located in Hingham, MA, installed six raised beds in its outdoor engagement area near the pool. The Cove’s outdoor gardens also support their environmental stewardship and help create a biodiverse environment in their shared outdoor space.
          </p>
          <p>
            <strong>Read more:</strong>
            <a href="https://greencitygrowers.com/success-stories/the-kensington-and-the-cove/" target="_blank">
              The Kensington &amp; The Cove
            </a>
          </p>
        `,
        status: "Live",
      }
    ];
      
    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat:  42.321890, lng:  -70.988094 },
        zoom: 12,
        mapTypeId: "satellite",
      });

      // Create markers
      sites.forEach((site) => {
        // Special case: no type (Headquarters) → simple marker that resets to overview
        if (!site.type) {
          const marker = new google.maps.Marker({
            position: site.position,
            map,
            title: site.name,
          });

          marker.addListener("click", () => {
            showOverviewText("all");
          });

          markers.push({ marker, site });
          return;
        }

        // Typed sites → custom icons
        let iconUrl;

        if (site.type === "Residential") {
          iconUrl = "residential.png";
        } else if (site.type === "Commercial") {
          iconUrl = "commercial.png";
        } else if (site.type === "School") {
          iconUrl = "school.png";
        } else if (site.type === "HQ") {
          iconUrl = "star.png";
        }

        const marker = new google.maps.Marker({
          position: site.position,
          map,
          title: site.name,
          icon: {
            url: iconUrl,
            scaledSize: new google.maps.Size(40, 40),
          },
        });

        marker.addListener("click", () => {
          showSiteDetails(site);
        });

        markers.push({ marker, site });
      });

      // Clicking on empty map → reset to overview (all)
      map.addListener("click", () => {
        showOverviewText("all");
      });

      // Initial side panel
      showOverviewText("all");
    }

    function showSiteDetails(site) {
      const panel = document.getElementById("side-panel");
    
      panel.innerHTML = `
        <div class="site-title">${site.name}</div>
        <div class="accent-bar"></div>
        <div class="site-description">
          ${site.description || ""}
        </div>
      `;
    }

    // Build overview panel (including filters) and apply filter
    function showOverviewText(selectedType = "all") {
      const panel = document.getElementById("side-panel");

      panel.innerHTML = `
        <div class="site-title">Our Gardens</div>
        <div class="accent-bar"></div>

        <div class="site-description">
          We have gardens all over the Boston area. Explore our different sites and learn more about the communities they serve.
        </div>

        <div id="filters" class="filters">
          <button data-filter="all" class="filter-btn">All</button>
          <button data-filter="school" class="filter-btn">Schools</button>
          <button data-filter="commercial" class="filter-btn">Commercial</button>
          <button data-filter="residential" class="filter-btn">Residential</button>
        </div>
      `;

      // Wire up filter buttons
      setupFilters();

      // Set active button
      const activeBtn = panel.querySelector(
        `.filter-btn[data-filter="${selectedType}"]`
      );
      if (activeBtn) {
        panel.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        activeBtn.classList.add("active");
      }

      // Apply marker filter
      filterMarkers(selectedType);
    }

    function setupFilters() {
      const buttons = document.querySelectorAll(".filter-btn");

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const type = btn.dataset.filter; // "all", "school", "commercial", "residential"
          showOverviewText(type);         // rebuild panel and reapply filter
        });
      });
    }

    function filterMarkers(type) {
      const filterType = type.toLowerCase();

      markers.forEach(({ marker, site }) => {
        if (!site.type) {
          // Headquarters: show only when "all"
          marker.setVisible(filterType === "all");
          return;
        }

        const siteType = site.type.toLowerCase(); // "commercial", etc.
        const shouldShow = filterType === "all" || siteType === filterType;
        marker.setVisible(shouldShow);
      });
    }
      
  </script>

</body>

</html>
